# user-activity-reporter Configuration File
# Part of user-activity-reporter package

# Output settings
DEFAULT_FORMAT="table"
ENABLE_COLORS=true
SHOW_HEADER=true

# Monitoring settings
DEFAULT_REFRESH_INTERVAL=5
PROCESS_THRESHOLD=100

# Display settings
TIME_FORMAT="%Y-%m-%d %H:%M:%S"
DATE_FORMAT="%Y-%m-%d"

# Export settings
EXPORT_DIR="/var/log/user-activity"
DEFAULT_EXPORT_FORMAT="json"

# User filtering
# Comma-separated list of users to exclude (supports wildcards)
EXCLUDE_USERS="nobody,systemd-*"

# Comma-separated list of users to include (empty = all users)
INCLUDE_ONLY=""

# Advanced settings
# Minimum UID for regular users (default: 1000)
MIN_UID=1000

# Maximum UID for regular users (default: 60000)
MAX_UID=60000

# Show system users (UID < 1000)
SHOW_SYSTEM_USERS=false

# Sort order (asc, desc)
DEFAULT_SORT_ORDER="asc"

# Default sort field (user, login, duration, processes)
DEFAULT_SORT_FIELD="user"

# Watch mode settings
# Clear screen between refreshes in watch mode
WATCH_CLEAR_SCREEN=true

# Show timestamp in watch mode
WATCH_SHOW_TIMESTAMP=true

# Alert settings
# Enable alerts when process count exceeds threshold
ENABLE_ALERTS=true

# Alert message format
ALERT_MESSAGE="⚠️  User %s has %d processes (threshold: %d)"

# Logging settings
# Enable logging to file
ENABLE_LOGGING=false

# Log file path
LOG_FILE="/var/log/user-activity-reporter.log"

# Log level (debug, info, warning, error)
LOG_LEVEL="info"